version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Taipei"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      next-and-react:
        patterns:
          - "next"
          - "@next/*"
          - "react"
          - "react-dom"
          - "@types/react*"
      supabase:
        patterns:
          - "@supabase/*"
      ui:
        patterns:
          - "@radix-ui/*"
          - "tailwindcss"
          - "@tailwindcss/*"
          - "tailwind-*"
          - "lucide-react"
          - "@tabler/*"
          - "class-variance-authority"
          - "clsx"
      tooling:
        patterns:
          - "eslint*"
          - "prettier*"
          - "typescript"
          - "@types/*"
          - "turbo"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore"
